<!-- TopAppBar -->
<header class="bg-surface/80 backdrop-blur-lg dark:bg-surface-dim/80 border-b border-outline-variant/10 fixed w-full top-0 z-30">
<div class="flex justify-between items-center px-gutter h-16 w-full max-w-content mx-auto">

<button class="text-primary dark:text-primary-fixed hover:text-primary-container transition-colors p-2 -ml-2 rounded-full">

<div class="flex items-center gap-2">
<h1 class="font-headline-md text-headline-md text-primary dark:text-primary-fixed font-bold truncate max-w-[200px]">Research Synthesis: Quantum Computing</h1>

</div>
</div>

<div class="bg-surface-container-high rounded-xl rounded-tr-sm p-4 max-w-[85%] shadow-sm border border-outline-variant/10">
<p class="font-body-md text-body-md text-on-surface">Wann endet die Rückmeldefrist für das Wintersemester?</p>
</div>
</div>
<!-- AI Response -->
<div class="flex justify-start w-full">
<div class="flex gap-3 max-w-[90%]">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center border border-primary/20 shadow-[0_0_10px_rgba(32,218,223,0.1)] flex-shrink-0">
<span class="material-symbols-outlined text-primary text-sm" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<div class="bg-surface-container/50 backdrop-blur-sm rounded-xl rounded-tl-sm p-4 border-l border-primary shadow-[0_2px_8px_rgba(0,0,0,0.2)]">

                        Die Rückmeldefrist für das Wintersemester 2024/25 endet am 15. Juli 2024 <sup class="font-citation text-citation text-primary cursor-pointer hover:underline">[1]</sup>. Bitte beachte, dass bei verspäteter Zahlung eine Säumnisgebühr anfällt <sup class="font-citation text-citation text-primary cursor-pointer hover:underline">[2]</sup>.<span class="inline-block w-1.5 h-4 ml-1 bg-primary animate-pulse align-middle"></span>
</p>

<div class="flex flex-wrap gap-2">
<button class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-surface-container-highest border border-outline-variant/30 hover:border-primary/50 hover:bg-surface-variant/50 transition-colors group">
<span class="material-symbols-outlined text-[14px] text-outline group-hover:text-primary transition-colors">description</span>
<span class="font-citation text-citation text-on-surface-variant group-hover:text-primary transition-colors">Termine_WS24.pdf - S. 2</span>
</button>
<button class="flex items-center gap-1.5 px-2.5 py-1.5 rounded-md bg-surface-container-highest border border-outline-variant/30 hover:border-primary/50 hover:bg-surface-variant/50 transition-colors group">
<span class="material-symbols-outlined text-[14px] text-outline group-hover:text-primary transition-colors">description</span>
<span class="font-citation text-citation text-on-surface-variant group-hover:text-primary transition-colors">Gebührensatzung.pdf - S. 5</span>

</div>
</div>
</div>
</div>

</div>
</div>
