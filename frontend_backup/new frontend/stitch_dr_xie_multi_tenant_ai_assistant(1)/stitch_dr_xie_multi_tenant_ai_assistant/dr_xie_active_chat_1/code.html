</div>

<div class="flex gap-3 max-w-[90%]">
<div class="w-8 h-8 rounded-full bg-surface-container-highest flex items-center justify-center border border-secondary/20 shadow-[0_0_10px_rgba(69,216,237,0.1)] flex-shrink-0">
<span class="material-symbols-outlined text-secondary text-sm" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
